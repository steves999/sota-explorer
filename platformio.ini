; SOTA Field Instrument — Milestone 1: GPS + BME280 bring-up
; Board: LILYGO T-Display-S3 AMOLED (Touch), ESP32-S3, 16MB flash, 8MB PSRAM
;
; NOTE (Steve): This project deliberately does NOT use LILYGO's own
; LilyGo-AMOLED-Series example tree / src_dir-switching scheme. That repo's
; environment names and board= values are unconfirmed for the *Touch*
; 1.91" variant specifically (the repo mixes Touch/non-Touch/T4-S3/Lite
; boards under one src tree with example-specific environments like
; "T-Display-AMOLED-191-ArduinoGFX" — name unverified for Touch).
;
; Once you've cloned github.com/Xinyuan-LilyGO/LilyGo-AMOLED-Series locally,
; open its platformio.ini and check the [env:...] section actually used for
; the 1.91" TOUCH board — note the exact `board =` value and any
; -D defines it sets, and we'll fold those into this file's build_flags
; before Milestone 2 (display).
;
; BOARD CONFIG HISTORY (for the record, after a long debugging session):
; - There is NO built-in PlatformIO board ID for ESP32-S3 N16R8 (16MB
;   flash + 8MB Octal PSRAM). A board ID of that name does not exist —
;   confirmed via an open platformio/platform-espressif32 GitHub issue
;   requesting it be added.
; - The base "esp32-s3-devkitc-1" board (8MB, No PSRAM by default) IS
;   real; we override its flash/PSRAM settings directly below.
; - KEY FIX: flash size override goes under board_upload.*, NOT
;   board_build.* — board_build.flash_size is not a real override point
;   for this purpose and was being silently ignored.
; - CONFIRMED WORKING on Steve's bench (June 2026) with a minimal sketch
;   (no Wire, no GPS, no BME280 libraries) before being used for the
;   real Milestone 1 firmware below.

[env:lilygo-t-display-s3-amoled-touch]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.flash_mode = qio
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.filesystem = littlefs
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216

build_flags =
    -DBOARD_HAS_PSRAM
    ; Keep USB-CDC-on-boot ENABLED: Serial (USB-C) and Serial1 (GPIO43/44,
    ; the GPS UART) must stay independent. Do NOT disable this, or you'll
    ; lose the USB debug console.
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1

monitor_speed = 115200
upload_speed = 921600

lib_deps =
    mikalhart/TinyGPSPlus @ ^1.0.3
    adafruit/Adafruit BME280 Library @ ^2.2.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    ; Milestone 2 — display. CONFIRMED via `pio pkg search` on Steve's
    ; bench (June 2026) — this is the real PlatformIO registry ID, not
    ; a guess: xinyuan-lilygo/LilyGo-AMOLED-Series @ 1.2.3
    xinyuan-lilygo/LilyGo-AMOLED-Series @ ^1.2.3
    ; lvgl pinned to 8.4.0 — the library's own README explicitly states
    ; it's built/tested against lvgl 8.3.x/8.4.x; only one of their many
    ; examples targets lvgl9, so we avoid the auto-resolved 9.x default
    ; to sidestep a likely version-mismatch failure mode.
    lvgl/lvgl @ 8.4.0
